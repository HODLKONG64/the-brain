name: Mirror to Backup Repo

on:
  push:
    branches: [ main ]
  workflow_run:
    workflows: ["Moonboys Online Daily Deep Scout", "GK BRAIN Agent"]
    types: [completed]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror to Backup
        run: |
          git push --mirror https://x-access-token:${{ secrets.MIRROR_PAT }}@github.com/HODLKONG64/the-brain-mirror.git
