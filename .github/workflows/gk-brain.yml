name: GK BRAIN - 2 Hour Lore + Replies
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gk-brain
  cancel-in-progress: false

jobs:
  gk-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      GROK_TEXT_MODEL: ${{ secrets.GROK_TEXT_MODEL || 'grok-3-latest' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || '' }}
      CHANNEL_CHAT_IDS: ${{ secrets.CHANNEL_CHAT_IDS }}
      MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
      FANDOM_BOT_USER: ${{ secrets.FANDOM_BOT_USER }}
      FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
      FANDOM_WIKI_URL: ${{ secrets.FANDOM_WIKI_URL }}
      GROK_API_BASE: "https://api.x.ai/v1"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run crawl-brain
        run: python crawl-brain.py
        continue-on-error: true
      - name: Run analytics-brain
        run: python analytics-brain.py
        continue-on-error: true
      - name: Run GK BRAIN
        run: python gk-brain.py
      - name: Run wiki-brain
        run: python wiki-brain.py
        continue-on-error: true
      - name: Upload execution report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-report-${{ github.run_number }}
          path: execution-report-*.json
          if-no-files-found: ignore
          retention-days: 14
      - name: Commit updated state files
        run: |
          git config user.name "GK BRAIN Agent"
          git config user.email "gk-brain@users.noreply.github.com"
          git add -f \
            lore-history.md \
            reply-tracker.json \
            bot-state.json \
            crawl-snapshot.json \
            wiki-update-queue.json \
            telegram-offset.json \
            anomaly-history.json \
            engagement-tracker.json \
            brain1-canon.json \
            brain2-telegram-lore.json || true
          git diff --cached --quiet || git commit -m "chore: GK BRAIN state update [skip ci]"
          git push
        continue-on-error: true
      - name: Notify Telegram on failure
        if: failure()
        run: |
          python - <<'EOF'
          import os, requests
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_ids = [c.strip() for c in os.environ.get("CHANNEL_CHAT_IDS", "").split(",") if c.strip()]
          if not token or not chat_ids:
              print("[notify] No Telegram credentials — skipping failure notification.")
          else:
              run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
              run_url = f"https://github.com/HODLKONG64/the-brain/actions/runs/{run_id}"
              msg = f"🚨 GK BRAIN workflow FAILED\nRun: {run_url}"
              for chat_id in chat_ids:
                  try:
                      requests.post(
                          f"https://api.telegram.org/bot{token}/sendMessage",
                          json={"chat_id": chat_id, "text": msg},
                          timeout=10,
                      )
                  except Exception as e:
                      print(f"[notify] Failed to notify {chat_id}: {e}")
          EOF
