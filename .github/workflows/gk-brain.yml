name: GK BRAIN - 2 Hour Lore + Replies
on:
  workflow_dispatch:

jobs:
  gk-brain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install python-telegram-bot requests beautifulsoup4
      - name: Run GK BRAIN
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          CHANNEL_CHAT_IDS: ${{ secrets.CHANNEL_CHAT_IDS }}
          FANDOM_USERNAME: ${{ secrets.FANDOM_USERNAME }}
          FANDOM_PASSWORD: ${{ secrets.FANDOM_PASSWORD }}
        run: python gk-brain.py
