name: GK BRAIN - 4 Brain System (2 Hour Cycle)
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gk-brain
  cancel-in-progress: false

jobs:
  gk-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CHANNEL_CHAT_IDS: ${{ secrets.CHANNEL_CHAT_IDS }}
      MESSAGE_THREAD_ID: ${{ secrets.MESSAGE_THREAD_ID }}
      FANDOM_BOT_USER: ${{ secrets.FANDOM_BOT_USER }}
      FANDOM_BOT_PASSWORD: ${{ secrets.FANDOM_BOT_PASSWORD }}
      FANDOM_WIKI_URL: ${{ secrets.FANDOM_WIKI_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROK_API_BASE: "https://api.x.ai/v1"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Brain 1: Crawl Brain ─────────────────────────────────────────────
      - name: 🕷️ Run Crawl Brain
        id: crawl_brain
        run: python crawl-brain.py
        continue-on-error: true

      # ── Brain 2: Analytics Brain ─────────────────────────────────────────
      - name: 📊 Run Analytics Brain
        id: analytics_brain
        run: python analytics-brain.py
        continue-on-error: true

      # ── Brain 3: Lore Brain ──────────────────────────────────────────────
      - name: 🧠 Run Lore Brain (GK BRAIN)
        id: lore_brain
        run: python gk-brain.py
        continue-on-error: true

      # ── Brain 4: Wiki Brain ──────────────────────────────────────────────
      - name: 📖 Run Wiki Brain
        id: wiki_brain
        run: python wiki-brain.py
        continue-on-error: true

      # ── Upload execution report ──────────────────────────────────────────
      - name: Upload execution report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-report-${{ github.run_number }}
          path: |
            execution-report-*.json
            reports/analytics-report-*.json
          if-no-files-found: ignore
          retention-days: 14

      # ── Commit all updated state files ───────────────────────────────────
      - name: Commit updated state files
        if: always()
        run: |
          git config user.name "GK BRAIN Agent"
          git config user.email "gk-brain@users.noreply.github.com"
          git add -f \
            lore-history.md \
            reply-tracker.json \
            bot-state.json \
            crawl-snapshot.json \
            crawl-results.json \
            crawl-fingerprints.json \
            wiki-update-queue.json \
            telegram-offset.json \
            anomaly-history.json \
            engagement-tracker.json \
            recommendations.json \
            reports/ || true
          git diff --cached --quiet || git commit -m "chore: GK BRAIN 4-brain state update [skip ci]"
          git push
        continue-on-error: true

      # ── Failure notification ─────────────────────────────────────────────
      - name: 🚨 Notify failure via Telegram
        if: >
          steps.crawl_brain.conclusion == 'failure' ||
          steps.analytics_brain.conclusion == 'failure' ||
          steps.lore_brain.conclusion == 'failure' ||
          steps.wiki_brain.conclusion == 'failure'
        run: |
          FAILED_BRAINS=""
          [ "${{ steps.crawl_brain.conclusion }}" = "failure" ]    && FAILED_BRAINS="${FAILED_BRAINS} CrawlBrain"
          [ "${{ steps.analytics_brain.conclusion }}" = "failure" ] && FAILED_BRAINS="${FAILED_BRAINS} AnalyticsBrain"
          [ "${{ steps.lore_brain.conclusion }}" = "failure" ]      && FAILED_BRAINS="${FAILED_BRAINS} LoreBrain"
          [ "${{ steps.wiki_brain.conclusion }}" = "failure" ]      && FAILED_BRAINS="${FAILED_BRAINS} WikiBrain"
          MESSAGE="⚠️ GK BRAIN alert — brain(s) failed:${FAILED_BRAINS}%0ARun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=$(echo ${CHANNEL_CHAT_IDS} | cut -d',' -f1)" \
            -d "text=${MESSAGE}" || true
        continue-on-error: true

